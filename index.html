<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DS NOW 사내기자단 2026</title>
    <style>
        :root {
            --primary: #00aaff;
            --bg: #05070a;
            --text: #ffffff;
            --text-dim: #6b7280;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Pretendard', -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 36px 20px 28px;
            text-align: center;
            background: linear-gradient(to bottom, #111827, #05070a);
        }
        h1 {
            font-size: 1.9rem;
            margin-bottom: 6px;
            background: linear-gradient(45deg, var(--primary), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            font-size: 0.82rem;
            color: var(--text-dim);
            letter-spacing: 1.5px;
        }

        /* ── Player ── */
        .player-wrapper {
            position: sticky;
            top: 0;
            width: 100%;
            max-width: 540px;
            padding: 12px 20px 10px;
            background: rgba(5, 7, 10, 0.94);
            backdrop-filter: blur(14px);
            z-index: 100;
            border-bottom: 1px solid #1f2937;
        }
        audio { width: 100%; filter: invert(100%) hue-rotate(180deg); }
        .progress-wrap {
            width: 100%;
            height: 3px;
            background: #1f2937;
            border-radius: 2px;
            margin-top: 9px;
            cursor: pointer;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 2px;
            width: 0%;
            pointer-events: none;
        }
        .time-label {
            font-size: 0.68rem;
            color: var(--text-dim);
            margin-top: 5px;
            text-align: right;
            letter-spacing: 0.5px;
        }

        /* ── Lyrics ── */
        .lyrics-container {
            width: 100%;
            max-width: 640px;
            padding: 40px 24px 180px;
            text-align: center;
        }

        .line {
            padding: 11px 0;
            font-size: 1.18rem;
            color: var(--text-dim);
            transition: color 0.3s ease, font-size 0.3s ease, font-weight 0.3s ease, text-shadow 0.3s ease;
            line-height: 1.65;
        }
        .line.active {
            color: #ffffff;
            font-weight: 800;
            font-size: 1.52rem;
            text-shadow: 0 0 20px rgba(0, 170, 255, 0.6);
        }
        .spoken {
            font-style: italic;
            font-size: 1.05rem;
        }
        .spoken.active {
            font-size: 1.28rem;
        }
        .section-tag {
            font-size: 0.72rem;
            color: var(--primary);
            margin-top: 50px;
            margin-bottom: 2px;
            font-weight: 700;
            letter-spacing: 2.5px;
            opacity: 0.75;
        }
    </style>
</head>

// ── Build DOM ──────────────────────────────────────────────
const box = document.getElementById('lyrics-box');
const audio = document.getElementById('audio');
const progFill = document.getElementById('prog-fill');
const progWrap = document.getElementById('prog-wrap');
const timeLabel = document.getElementById('time-label');

const lineEls = []; // only non-tag elements → { el, t }

L.forEach((d, i) => {
    const el = document.createElement('div');
    if (d.tag) {
        el.className = 'section-tag';
        el.textContent = d.tag;
    } else {
        el.className = d.s ? 'line spoken' : 'line';
        el.textContent = d.text;
        lineEls.push({ el, t: d.t });
    }
    el.id = `l${i}`;
    box.appendChild(el);
});

// ── Helpers ────────────────────────────────────────────────
function fmt(s) {
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60).toString().padStart(2, '0');
    return `${m}:${sec}`;
}

// ── Progress bar seek ──────────────────────────────────────
progWrap.addEventListener('click', e => {
    if (!audio.duration) return;
    const r = progWrap.getBoundingClientRect();
    audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
});

// ── Active line tracking ───────────────────────────────────
let lastIdx = -1;

audio.addEventListener('timeupdate', () => {
    const ct = audio.currentTime;

    // progress bar
    if (audio.duration) {
        progFill.style.width = (ct / audio.duration * 100) + '%';
        timeLabel.textContent = fmt(ct) + ' / ' + fmt(audio.duration);
    }

    // find active line (binary-search style)
    let idx = -1;
    for (let i = 0; i < lineEls.length; i++) {
        const next = lineEls[i + 1];
        if (ct >= lineEls[i].t && (!next || ct < next.t)) {
            idx = i;
            break;
        }
    }
    if (idx === lastIdx || idx === -1) return;

    if (lastIdx !== -1) lineEls[lastIdx].el.classList.remove('active');
    lineEls[idx].el.classList.add('active');
    lineEls[idx].el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    lastIdx = idx;
});
</script>
