<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DS NOW 사내기자단 2026</title>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg: #0b0e14;
            --text: #ffffff;
            --text-dim: #4b5563;
        }

        body {
            font-family: 'Pretendard', -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            width: 100%;
            padding: 50px 20px;
            text-align: center;
            background: linear-gradient(180deg, #1e293b 0%, var(--bg) 100%);
        }

        h1 {
            font-size: 2.2rem;
            margin: 0;
            background: linear-gradient(to right, var(--primary), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .player-fixed {
            position: sticky;
            top: 0;
            width: 100%;
            max-width: 600px;
            padding: 20px;
            background: rgba(11, 14, 20, 0.9);
            backdrop-filter: blur(15px);
            z-index: 100;
            border-bottom: 1px solid #1f2937;
        }

        audio {
            width: 100%;
            filter: invert(100%) hue-rotate(180deg) brightness(1.2);
        }

        .lyrics-wrap {
            width: 100%;
            max-width: 700px;
            padding: 60px 20px 200px;
            text-align: center;
            box-sizing: border-box;
        }

        .l-line {
            padding: 18px 0;
            font-size: 1.3rem;
            color: var(--text-dim);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            line-height: 1.6;
        }

        .l-line.active {
            color: var(--text);
            font-weight: 800;
            font-size: 1.7rem;
            transform: scale(1.08);
            text-shadow: 0 0 20px rgba(0, 210, 255, 0.6);
        }

        .l-tag {
            font-size: 0.85rem;
            color: var(--primary);
            margin-top: 60px;
            margin-bottom: 15px;
            font-weight: bold;
            letter-spacing: 3px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

<header>
    <h1>DS NOW 사내기자단 2026</h1>
</header>

<div class="player-fixed">
    <audio id="player" controls>
        <source src="DS NOW 사내기자단.mp3" type="audio/mpeg">
    </audio>
</div>

<div class="lyrics-wrap" id="lyrics-box"></div>

<script>
    // 곡의 흐름을 분석한 정밀 타임스탬프 (초 단위)
    const syncData = [
        { time: 0, text: "2026년, 세 번째 계절이 왔다", type: "spoken" },
        { time: 3.5, text: "트렌드를 읽고, 기술을 파고, 책을 펼치고, 길을 떠나" },
        { time: 8.2, text: "DS의 일상 속 숨겨진 이야기를 꺼내는 사람들" },
        { time: 13.0, text: "치열한 경쟁을 뚫고 이 자리에 선" },
        { time: 16.5, text: "17팀의 목소리 — DS NOW, 시작한다" },

        { time: 20.5, text: "[VERSE 1]", type: "tag" },
        { time: 21.0, text: "사옥 복도 끝에서 카메라 셔터 눌러" },
        { time: 24.5, text: "평범한 하루 속에 특별한 장면 담아" },
        { time: 28.0, text: "기술의 흐름 위에 트렌드 파도 타고" },
        { time: 31.5, text: "독서 한 줄 여행 한 컷, 이야기가 피어나" },
        { time: 35.0, text: "경쟁을 뚫고 선 기자들, 눈빛부터 달라" },
        { time: 38.5, text: "DS의 심장 박동을 활자로 전해줄게" },
        { time: 41.8, text: "뉴스룸이 따로 없어, 현장이 곧 편집실" },
        { time: 45.2, text: "오늘도 DS NOW는 세상을 향해 달려" },

        { time: 48.5, text: "[CHORUS]", type: "tag" },
        { time: 49.0, text: "DS NOW — 3기가 왔다" },
        { time: 52.2, text: "트렌드 기술 독서 여행, 전부 다 우리 거야" },
        { time: 55.8, text: "신규 명예 나란히 서서" },
        { time: 59.2, text: "DS의 일상을 세상에 외쳐" },
        { time: 62.5, text: "DS NOW — 멈추지 않아" },
        { time: 66.0, text: "치열하게 선발된 이름들이 빛나" },
        { time: 69.5, text: "2026 이 무대 위에" },
        { time: 73.0, text: "우리의 이야기, 지금 시작해" },

        { time: 76.5, text: "[VERSE 2 - ROLL CALL]", type: "tag" },
        { time: 77.0, text: "마음이 — 따뜻한 시선으로 사람을 담고" },
        { time: 80.2, text: "막내 김사원 — 신입의 눈으로 세상을 열고" },
        { time: 83.5, text: "물리군 — 복잡한 원리 쉽게 풀어내고" },
        { time: 86.8, text: "불꽃셔터카리스마 김디카 — 한 컷에 모든 걸 담아" },
        { time: 90.2, text: "사부작거리는 라쿤 — 조용히 깊이 파고들고" },
        { time: 93.5, text: "SENATHAN — 글로벌 감성으로 경계를 넘어" },
        { time: 97.0, text: "알파남 — 트렌드 최전선을 누비고" },
        { time: 100.2, text: "유랑이 — 길 위에서 이야기를 줍고" },
        { time: 103.5, text: "제이로그 J-LOG — 일상을 콘텐츠로 바꿔내고" },
        { time: 107.0, text: "칩토리 — 기술과 스토리 사이를 잇는다" },
        { time: 110.2, text: "신규 10팀, 펜 들어 — 지금 출발해" },

        { time: 113.5, text: "[BRIDGE]", type: "tag" },
        { time: 114.2, text: "그리고 여기, 이미 증명한 사람들이 있어" },
        { time: 117.5, text: "3기의 무게를 함께 짊어질 명예 기자 7팀 —" },

        { time: 121.5, text: "[VERSE 3 - HONORARY]", type: "tag" },
        { time: 122.0, text: "꼬질토끼 — 엉뚱하지만 날카롭게" },
        { time: 125.2, text: "NANO — 작지만 강하게, 정밀하게" },
        { time: 128.8, text: "동삭동 감자빵 — 동네 감성 특유의 따뜻함으로" },
        { time: 132.2, text: "로라 — 세련된 필치로 독자를 이끌고" },
        { time: 135.8, text: "카피바라 — 여유롭지만 깊이 있게" },
        { time: 139.2, text: "트래블유 — 여행의 언어로 DS를 넓히고" },
        { time: 142.5, text: "Han Bro — 형처럼 든든하게 스토리를 받쳐줘" },

        { time: 146.0, text: "트렌드가 바뀌어도, 기술이 진화해도" },
        { time: 149.5, text: "사람의 이야기는 언제나 유효해" },
        { time: 153.0, text: "DS NOW 3기 — 이게 우리의 사명이야" },

        { time: 158.0, text: "[FINAL CHORUS]", type: "tag" },
        { time: 159.0, text: "DS NOW — 3기가 왔다" },
        { time: 162.2, text: "트렌드 기술 독서 여행, 전부 다 우리 거야" },
        { time: 169.0, text: "DS NOW — 멈추지 않아" },
        { time: 172.5, text: "치열하게 선발된 이름들이 빛나" },
        { time: 176.0, text: "2026 이 무대 위에" },
        { time: 179.5, text: "우리의 이야기, 지금 시작해" },

        { time: 183.0, text: "[OUTRO]", type: "tag" },
        { time: 184.0, text: "DS NOW 3기 — 우리가 쓴다" },
        { time: 188.0, text: "2026, 지금 여기서 📰✨" }
    ];

    const box = document.getElementById('lyrics-box');
    const audio = document.getElementById('player');

    // 가사 생성
    syncData.forEach((d, i) => {
        const div = document.createElement('div');
        div.className = d.type === 'tag' ? 'l-tag' : 'l-line';
        div.id = `l-${i}`;
        div.innerText = d.text;
        if (d.type !== 'tag') {
            div.onclick = () => { audio.currentTime = d.time; };
        }
        box.appendChild(div);
    });

    // 실시간 싱크 추적
    audio.addEventListener('timeupdate', () => {
        const now = audio.currentTime;
        let activeIdx = -1;

        for (let i = 0; i < syncData.length; i++) {
            if (syncData[i].type !== 'tag' && now >= syncData[i].time) {
                activeIdx = i;
            }
        }

        if (activeIdx !== -1) {
            document.querySelectorAll('.l-line.active').forEach(el => el.classList.remove('active'));
            const activeEl = document.getElementById(`l-${activeIdx}`);
            if (activeEl) {
                activeEl.classList.add('active');
                activeEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }
    });
</script>
</body>
</html>
