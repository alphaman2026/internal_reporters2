<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DS NOW 사내기자단 2026</title>
    <style>
        :root {
            --primary: #00aaff;
            --bg: #05070a;
            --text: #ffffff;
            --text-dim: #6b7280;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Pretendard', -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 36px 20px 28px;
            text-align: center;
            background: linear-gradient(to bottom, #111827, #05070a);
        }

        h1 {
            font-size: 1.9rem;
            margin: 0 0 6px;
            background: linear-gradient(45deg, var(--primary), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        .player-wrapper {
            position: sticky;
            top: 0;
            width: 100%;
            max-width: 520px;
            padding: 14px 20px;
            background: rgba(5, 7, 10, 0.92);
            backdrop-filter: blur(12px);
            z-index: 100;
            border-bottom: 1px solid #1f2937;
        }

        .progress-bar-wrap {
            width: 100%;
            height: 3px;
            background: #1f2937;
            border-radius: 2px;
            margin-top: 10px;
            cursor: pointer;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 2px;
            width: 0%;
            transition: width 0.3s linear;
        }

        audio {
            width: 100%;
            filter: invert(100%) hue-rotate(180deg);
        }

        .lyrics-container {
            width: 100%;
            max-width: 620px;
            padding: 40px 20px 160px;
            text-align: center;
        }

        .line {
            padding: 13px 0;
            font-size: 1.2rem;
            color: var(--text-dim);
            transition: all 0.35s ease;
            line-height: 1.6;
        }

        .line.active {
            color: var(--text);
            font-weight: 800;
            font-size: 1.55rem;
            text-shadow: 0 0 18px rgba(0, 170, 255, 0.55);
        }

        .section-tag {
            font-size: 0.75rem;
            color: var(--primary);
            margin-top: 48px;
            margin-bottom: 4px;
            font-weight: bold;
            letter-spacing: 2.5px;
            opacity: 0.8;
        }

        .spoken {
            font-style: italic;
            font-size: 1.05rem;
        }

        .spoken.active {
            font-size: 1.3rem;
        }
    </style>
</head>
<body>

<header>
    <h1>DS NOW 사내기자단 2026 📰</h1>
    <div class="subtitle">We Tell the Story — 3기</div>
</header>

<div class="player-wrapper">
    <audio id="music-player" controls>
        <source src="DS_NOW_사내기자단.mp3" type="audio/mpeg">
        <source src="DS NOW 사내기자단.mp3" type="audio/mpeg">
    </audio>
    <div class="progress-bar-wrap" id="progress-wrap">
        <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
</div>

<div class="lyrics-container" id="lyrics-box"></div>

        { time: 109, text: "막내 김사원 — 신입의 눈으로 세상을 열고" },

        { time: 115, text: "불꽃셔터카리스마 김디카 — 한 컷에 모든 걸 담아" },

        { time: 188, text: "낯선 도시에서 마주친 DS 사람의 얼굴", isSpoken: true },
        { time: 192, text: "그 모든 순간이 기사가 되고, 콘텐츠가 되고", isSpoken: true },
        { time: 196, text: "결국엔 우리 모두의 기억이 되는 거야", isSpoken: true },
        { time: 200, text: "DS NOW 3기 — 이게 우리의 사명이야", isSpoken: true },

        // Final Chorus
        { time: 204, text: "[Final Chorus]", isTag: true },
        { time: 205, text: "DS NOW — 3기가 왔다" },
        { time: 208, text: "트렌드 기술 독서 여행, 전부 다 우리 거야" },
        { time: 212, text: "신규 명예 나란히 서서" },
        { time: 215, text: "DS의 일상을 세상에 외쳐" },
        { time: 218, text: "DS NOW — 멈추지 않아" },
        { time: 221, text: "치열하게 선발된 이름들이 빛나" },
        { time: 224, text: "2026 이 무대 위에" },
        { time: 227, text: "우리의 이야기, 지금 시작해" },

        // Outro Roll Call
        { time: 231, text: "[Outro — 전원 Roll Call]", isTag: true },
        { time: 232, text: "마음이 — 막내 김사원 — 물리군" },
        { time: 235, text: "불꽃셔터카리스마 김디카 — 사부작거리는 라쿤" },
        { time: 238, text: "SENATHAN — 알파남 — 유랑이" },
        { time: 241, text: "제이로그 — 칩토리" },
        { time: 244, text: "꼬질토끼 — NANO — 동삭동 감자빵" },
        { time: 247, text: "로라 — 카피바라 — 트래블유 — Han Bro" },
        { time: 250, text: "신규 10팀, 명예 7팀" },
        { time: 253, text: "DS NOW 3기 — 우리가 쓴다" },
        { time: 257, text: "2026, 지금 여기서 📰✨" }
    ];

    const lyricsBox = document.getElementById('lyrics-box');
    const audio = document.getElementById('music-player');
    const progressFill = document.getElementById('progress-fill');
    const progressWrap = document.getElementById('progress-wrap');

    // Build DOM
    lyricsData.forEach((data, index) => {
        const div = document.createElement('div');
        if (data.isTag) {
            div.className = 'section-tag';
        } else {
            div.className = data.isSpoken ? 'line spoken' : 'line';
        }
        div.id = `line-${index}`;
        div.innerText = data.text;
        lyricsBox.appendChild(div);
    });

    // Progress bar click to seek
    progressWrap.addEventListener('click', (e) => {
        const rect = progressWrap.getBoundingClientRect();
        const ratio = (e.clientX - rect.left) / rect.width;
        if (audio.duration) audio.currentTime = ratio * audio.duration;
    });

    // Active line tracking
    let lastActiveIndex = -1;

    audio.addEventListener('timeupdate', () => {
        const currentTime = audio.currentTime;

        // Update progress bar
        if (audio.duration) {
            progressFill.style.width = (currentTime / audio.duration * 100) + '%';
        }

        // Find current active lyric line
        const nonTagLines = lyricsData
            .map((d, i) => ({ ...d, index: i }))
            .filter(d => !d.isTag);

        let activeIndex = -1;
        for (let i = 0; i < nonTagLines.length; i++) {
            const next = nonTagLines[i + 1];
            if (currentTime >= nonTagLines[i].time && (!next || currentTime < next.time)) {
                activeIndex = nonTagLines[i].index;
                break;
            }
        }

        if (activeIndex !== -1 && activeIndex !== lastActiveIndex) {
            document.querySelectorAll('.line.active').forEach(el => el.classList.remove('active'));
            const el = document.getElementById(`line-${activeIndex}`);
            if (el) {
                el.classList.add('active');
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
            lastActiveIndex = activeIndex;
        }
    });
</script>
</body>
</html>
