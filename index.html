<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DS NOW 사내기자단 2026</title>
    <style>
        :root {
            --primary: #00aaff;
            --bg: #05070a;
            --text: #ffffff;
            --text-dim: #6b7280;
        }

        body {
            font-family: 'Pretendard', -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 40px 20px;
            text-align: center;
            background: linear-gradient(to bottom, #111827, #05070a);
        }

        h1 {
            font-size: 2rem;
            margin: 0;
            background: linear-gradient(45deg, var(--primary), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .player-wrapper {
            position: sticky;
            top: 0;
            width: 100%;
            max-width: 500px;
            padding: 20px;
            background: rgba(5, 7, 10, 0.9);
            backdrop-filter: blur(10px);
            z-index: 100;
            border-bottom: 1px solid #1f2937;
        }

        audio { width: 100%; filter: invert(100%) hue-rotate(180deg); }

        .lyrics-container {
            width: 100%;
            max-width: 600px;
            padding: 40px 20px 150px 20px;
            text-align: center;
            box-sizing: border-box;
        }

        .line {
            padding: 15px 0;
            font-size: 1.25rem;
            color: var(--text-dim);
            transition: all 0.4s ease;
        }

        .line.active {
            color: var(--text);
            font-weight: 800;
            font-size: 1.6rem;
            text-shadow: 0 0 15px rgba(0, 170, 255, 0.5);
        }

        .section-tag {
            font-size: 0.8rem;
            color: var(--primary);
            margin-top: 50px;
            font-weight: bold;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<header>
    <h1>DS NOW 사내기자단 2026 📰</h1>
</header>

<div class="player-wrapper">
    <audio id="music-player" controls>
        <source src="DS NOW 사내기자단.mp3" type="audio/mpeg">
    </audio>
</div>

<div class="lyrics-container" id="lyrics-box"></div>

<script>
    const lyricsData = [
        { time: 0, text: "2026년, 세 번째 계절이 왔다" },
        { time: 3, text: "트렌드를 읽고, 기술을 파고, 책을 펼치고, 길을 떠나" },
        { time: 7, text: "DS의 일상 속 숨겨진 이야기를 꺼내는 사람들" },
        { time: 11, text: "치열한 경쟁을 뚫고 이 자리에 선" },
        { time: 14, text: "17팀의 목소리 — DS NOW, 시작한다" },
        { time: 18, text: "[Verse 1]", isTag: true },
        { time: 19, text: "사옥 복도 끝에서 카메라 셔터 눌러" },
        { time: 22, text: "평범한 하루 속에 특별한 장면 담아" },
        { time: 25, text: "기술의 흐름 위에 트렌드 파도 타고" },
        { time: 28, text: "독서 한 줄 여행 한 컷, 이야기가 피어나" },
        { time: 31, text: "경쟁을 뚫고 선 기자들, 눈빛부터 달라" },
        { time: 34, text: "DS의 심장 박동을 활자로 전해줄게" },
        { time: 37, text: "뉴스룸이 따로 없어, 현장이 곧 편집실" },
        { time: 40, text: "오늘도 DS NOW는 세상을 향해 달려" },
        { time: 43, text: "[Chorus]", isTag: true },
        { time: 44, text: "DS NOW — 3기가 왔다" },
        { time: 47, text: "트렌드 기술 독서 여행, 전부 다 우리 거야" },
        { time: 50, text: "신규 명예 나란히 서서" },
        { time: 53, text: "DS의 일상을 세상에 외쳐" },
        { time: 56, text: "DS NOW — 멈추지 않아" },
        { time: 59, text: "치열하게 선발된 이름들이 빛나" },
        { time: 62, text: "2026 이 무대 위에" },
        { time: 65, text: "우리의 이야기, 지금 시작해" },
        { time: 68, text: "[Verse 2 - 신규 10팀]", isTag: true },
        { time: 70, text: "마음이 — 따뜻한 시선으로 사람을 담고" },
        { time: 73, text: "막내 김사원 — 신입의 눈으로 세상을 열고" },
        { time: 76, text: "물리군 — 복잡한 원리 쉽게 풀어내고" },
        { time: 79, text: "불꽃셔터카리스마 김디카 — 한 컷에 모든 걸 담아" },
        { time: 82, text: "사부작거리는 라쿤 — 조용히 깊이 파고들고" },
        { time: 85, text: "SENATHAN — 글로벌 감성으로 경계를 넘어" },
        { time: 88, text: "알파남 — 트렌드 최전선을 누비고" },
        { time: 91, text: "유랑이 — 길 위에서 이야기를 줍고" },
        { time: 94, text: "제이로그 J-LOG — 일상을 콘텐츠로 바꿔내고" },
        { time: 97, text: "칩토리 — 기술과 스토리 사이를 잇는다" },
        { time: 100, text: "신규 10팀, 펜 들어 — 지금 출발해" },
        { time: 103, text: "[Bridge]", isTag: true },
        { time: 104, text: "이미 증명한 사람들이 있어, 명예 기자 7팀 —" },
        { time: 108, text: "[Verse 3 - 명예 7팀]", isTag: true },
        { time: 110, text: "꼬질토끼 — 엉뚱하지만 날카롭게" },
        { time: 113, text: "NANO — 작지만 강하게, 정밀하게" },
        { time: 116, text: "동삭동 감자빵 — 동네 감성 특유의 따뜻함으로" },
        { time: 119, text: "로라 — 세련된 필치로 독자를 이끌고" },
        { time: 122, text: "카피바라 — 여유롭지만 깊이 있게" },
        { time: 125, text: "트래블유 — 여행의 언어로 DS를 넓히고" },
        { time: 128, text: "Han Bro — 형처럼 든든하게 스토리를 받쳐줘" },
        { time: 131, text: "[Outro]", isTag: true },
        { time: 133, text: "DS NOW 3기 — 우리가 쓴다" },
        { time: 136, text: "2026, 지금 여기서 📰✨" }
    ];

    const lyricsBox = document.getElementById('lyrics-box');
    const audio = document.getElementById('music-player');

    lyricsData.forEach((data, index) => {
        const div = document.createElement('div');
        div.className = data.isTag ? 'section-tag' : 'line';
        div.id = `line-${index}`;
        div.innerText = data.text;
        lyricsBox.appendChild(div);
    });

    audio.addEventListener('timeupdate', () => {
        const currentTime = audio.currentTime;
        lyricsData.forEach((data, index) => {
            if (!data.isTag) {
                const element = document.getElementById(`line-${index}`);
                const nextData = lyricsData.slice(index + 1).find(d => !d.isTag);
                if (currentTime >= data.time && (!nextData || currentTime < nextData.time)) {
                    document.querySelectorAll('.line.active').forEach(el => el.classList.remove('active'));
                    element.classList.add('active');
                    element.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }
        });
    });
</script>
</body>
</html>
